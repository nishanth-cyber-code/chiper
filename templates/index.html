<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Secure Calc</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { primary: '#f9a406' },
          fontFamily: { sans: ['Manrope', 'sans-serif'] },
          borderRadius: { 'custom': '8px' }
        }
      }
    }
</script>
<style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
</style>
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md bg-zinc-900 border border-zinc-800 shadow-2xl overflow-hidden rounded-custom relative min-h-[600px] flex flex-col" id="app-container">
    
    <div class="flex flex-col h-full p-6 animate-fade-in" id="calc-interface">
        <div class="mb-8">
            <h1 class="text-zinc-500 text-sm font-medium tracking-widest uppercase mb-1">Secure Calc v2.0</h1>
            <div class="bg-zinc-800/50 p-6 rounded-custom text-right text-4xl font-light tracking-tight h-24 flex items-end justify-end overflow-hidden" id="calc-display">0</div>
        </div>
        <div class="grid grid-cols-4 gap-3 flex-grow">
            <button class="bg-zinc-800 hover:bg-zinc-700 p-4 rounded-custom text-zinc-400" onclick="press('AC')">AC</button>
            <button class="bg-zinc-800 hover:bg-zinc-700 p-4 rounded-custom text-primary" onclick="press('/')">÷</button>
            <button class="bg-zinc-800 hover:bg-zinc-700 p-4 rounded-custom text-primary" onclick="press('*')">×</button>
            <button class="bg-zinc-800 hover:bg-zinc-700 p-4 rounded-custom text-zinc-400" onclick="press('DEL')">⌫</button>
            <button class="bg-zinc-800/40 hover:bg-zinc-700 p-4 rounded-custom" onclick="press('7')">7</button>
            <button class="bg-zinc-800/40 hover:bg-zinc-700 p-4 rounded-custom" onclick="press('8')">8</button>
            <button class="bg-zinc-800/40 hover:bg-zinc-700 p-4 rounded-custom" onclick="press('9')">9</button>
            <button class="bg-zinc-800 hover:bg-zinc-700 p-4 rounded-custom text-primary" onclick="press('-')">−</button>
            <button class="bg-zinc-800/40 hover:bg-zinc-700 p-4 rounded-custom" onclick="press('4')">4</button>
            <button class="bg-zinc-800/40 hover:bg-zinc-700 p-4 rounded-custom" onclick="press('5')">5</button>
            <button class="bg-zinc-800/40 hover:bg-zinc-700 p-4 rounded-custom" onclick="press('6')">6</button>
            <button class="bg-zinc-800 hover:bg-zinc-700 p-4 rounded-custom text-primary" onclick="press('+')">+</button>
            <button class="bg-zinc-800/40 hover:bg-zinc-700 p-4 rounded-custom" onclick="press('1')">1</button>
            <button class="bg-zinc-800/40 hover:bg-zinc-700 p-4 rounded-custom" onclick="press('2')">2</button>
            <button class="bg-zinc-800/40 hover:bg-zinc-700 p-4 rounded-custom" onclick="press('3')">3</button>
            <button class="bg-primary hover:bg-orange-500 p-4 rounded-custom text-zinc-950 font-bold row-span-2" onclick="calculate()">=</button>
            <button class="bg-zinc-800/40 hover:bg-zinc-700 p-4 rounded-custom col-span-2" onclick="press('0')">0</button>
            <button class="bg-zinc-800/40 hover:bg-zinc-700 p-4 rounded-custom" onclick="press('.')">.</button>
        </div>
    </div>

    <div class="hidden flex-col h-full animate-fade-in" id="chat-interface">
        <header class="p-4 border-b border-zinc-800 flex items-center justify-between bg-zinc-900/50 backdrop-blur-md">
            <div class="flex items-center gap-3">
                <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                <span class="font-bold text-sm tracking-tight">ENCRYPTED CHANNEL</span>
            </div>
            <button class="text-xs bg-zinc-800 hover:bg-red-900/30 text-zinc-400 px-3 py-1.5 rounded-custom border border-zinc-700" onclick="handleClearChat()">Clear Chat</button>
        </header>

        <div class="flex-grow overflow-y-auto p-4 space-y-4 no-scrollbar flex flex-col" id="message-container">
            <div class="text-center"><span class="text-[10px] text-zinc-600 bg-zinc-800/30 px-2 py-1 rounded">End-to-end encryption active</span></div>
        </div>

        <footer class="p-4 border-t border-zinc-800 bg-zinc-900">
            <div id="reply-bar" class="hidden bg-zinc-800 p-2 text-xs flex justify-between border-b border-zinc-700 mb-2 rounded">
                <span id="reply-preview" class="truncate text-zinc-400"></span>
                <button type="button" onclick="cancelReply()" class="text-red-500 font-bold px-2">X</button>
            </div>          
            <form class="flex gap-2" id="chat-form" onsubmit="sendMessage(event)">
                <input autocomplete="off" class="flex-grow bg-zinc-800 border-zinc-700 rounded-custom text-sm focus:ring-primary focus:border-primary" id="chat-input" placeholder="Secure message..." type="text"/>
                <button class="bg-primary hover:bg-orange-500 text-zinc-950 p-2 rounded-custom" type="submit">
                    <svg fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><path d="m22 2-7 20-4-9-9-4Z"></path><path d="M22 2 11 13"></path></svg>
                </button>
            </form>
        </footer>
    </div>
</div>

<script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
<script>
    // --- 1. CONFIGURATION ---
    const socket = io("https://chiper-pbe3.onrender.com/"); 
    let currentUser = localStorage.getItem('chat_identity') || "";
    let currentInput = ''; // 'UserA' or 'UserB'
    let replyingTo = null; // Stores the text we are replying to

    const chatContainer = document.getElementById('message-container');
    const chatInput = document.getElementById('chat-input');

    // --- 2. CALCULATOR LOGIC (DUAL LOGIN) ---
    function press(val) {
        if (val === 'AC') currentInput = '';
        else if (val === 'DEL') currentInput = currentInput.slice(0, -1);
        else if (currentInput.length < 12) currentInput += val;
        document.getElementById('calc-display').innerText = currentInput || '0';
    }

    function calculate() {
        // LOGIN CHECK
        if (currentInput === '2912') {
            currentUser = "UserA";
            localStorage.setItem('chat_identity', 'UserA');// UserA will always be on the RIGHT
            unlockChat();
            location.reload();
            return;
        } else if (currentInput === '1229') {
            currentUser = "UserB";
            localStorage.setItem('chat_identity', 'UserB');// UserB will always be on the LEFT
            unlockChat();
            location.reload();
            return;
        }

        // MATH CHECK
        try {
            let res = eval(currentInput.replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-'));
            currentInput = res.toString();
            document.getElementById('calc-display').innerText = currentInput;
        } catch (e) { document.getElementById('calc-display').innerText = 'Error'; currentInput = ''; }
    }

    function unlockChat() {
        document.getElementById('calc-interface').classList.add('hidden');
        document.getElementById('chat-interface').classList.remove('hidden');
        document.getElementById('chat-interface').classList.add('flex');
    }

    // --- 3. CHAT LOGIC ---
    function sendMessage(e) {
        if (e) e.preventDefault();
        const text = chatInput.value.trim();
        if (!text) return;

        // Send to Python with Reply data
        socket.emit('message', { 
            text: text, 
            sender: currentUser,
            reply_to: replyingTo 
        });

        chatInput.value = '';
        cancelReply(); // Clear the reply bar
    }

    socket.on('render_message', (data) => {
        // If the sender of the message is ME, put it on the RIGHT
        const isMe = (data.sender === currentUser);
        appendMessage(data, isMe);
    });

    function appendMessage(data, isMe) {
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const messageDiv = document.createElement('div');
        
        // Alignment: Right if isMe, Left if not
        messageDiv.className = isMe ? 'self-end max-w-[80%] mb-2' : 'self-start max-w-[80%] mb-2';
        
        // Handle the Reply preview inside the bubble
        let replyHTML = data.reply_to ? 
            `<div class="text-[10px] opacity-60 italic border-l-2 border-primary pl-2 mb-1">Replying to: ${data.reply_to}</div>` : '';

        messageDiv.innerHTML = `
            ${replyHTML}
            <div class="${isMe ? 'bg-primary text-zinc-950' : 'bg-zinc-800 text-zinc-200'} p-3 rounded-custom shadow-lg relative group">
                <p class="text-sm">${data.text}</p>
                <button onclick="startReply('${data.text.replace(/'/g, "\\'")}')" class="absolute -top-2 -right-2 bg-zinc-700 text-white rounded-full p-1 hidden group-hover:block text-[10px]">↩</button>
            </div>
            <span class="text-[10px] text-zinc-500 mt-1 block ${isMe ? 'text-right' : 'text-left'}">${data.sender} • ${time}</span>
        `;
        
        chatContainer.appendChild(messageDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    // --- 4. REPLY UI HELPERS ---
    function startReply(text) {
        replyingTo = text;
        document.getElementById('reply-preview').innerText = "Replying to: " + text;
        document.getElementById('reply-bar').classList.remove('hidden');
        chatInput.focus();
    }

    function cancelReply() {
        replyingTo = null;
        document.getElementById('reply-bar').classList.add('hidden');
    }

    function handleClearChat() { chatContainer.innerHTML = ''; }
</script>
</body></html>
